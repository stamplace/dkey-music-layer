<!doctype html>
<html lang="he" dir="rtl">
<head>

  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#050711">
  <title>DKey Living Songs</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="library-shell">
    <section class="hero">
      <div class="eyebrow">DKey Music Layer</div>
      <h1>שירים שהם אתרים חיים</h1>
      <p>
        כל שיר הוא נכס חי: מילים, תזמון, Canvas, אנרגיה, תנועה, מצב קליפ ושיתוף.
      </p>
    </section>

    <section class="library-panel" aria-label="Living Songs Library">
      <div class="panel-header">
        <h2>Living Songs</h2>
        <span id="songCount">טוען…</span>
      </div>

      <div id="songsGrid" class="songs-grid"></div>
    </section>

    <footer class="footer">
      <span>DKey Living Song Format · v0.1</span>
      <span>HTML + Canvas + Song Asset</span>
    </footer>
  </main>

  <script type="module" src="./app.js"></script>

</html>
