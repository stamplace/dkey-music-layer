name: DML CI

on:
  push:
    branches: [ main, develop, "wave/**", "production/**" ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Full verify
        run: npm run verify

      - name: Upload generated DML artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dml-generated-artifacts
          path: |
            generated/**
            assets/rights/**
          if-no-files-found: warn

      - name: Upload generated audio artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dml-generated-audio
          path: |
            generated/audio/**
          if-no-files-found: warn
