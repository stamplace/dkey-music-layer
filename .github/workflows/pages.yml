name: DML Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'site/**'
      - 'tools/audio-wav-renderer/**'
      - 'assets/demo-midi-events/**'
      - 'package.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build product audio
        run: |
          npm run audio:write
          mkdir -p site/audio/hasidic-modern
          cp generated/audio/hasidic-modern/first-song.wav site/audio/hasidic-modern/first-song.wav

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
